name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm run lint

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: pnpm run build:unpacked:linux

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: pnpm run build:unpacked

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: pnpm run build:unpacked:mac

      - name: Unit tests (node)
        run: pnpm exec vitest run

      - name: Component & integration tests (jsdom)
        run: pnpm exec vitest run --config vitest.jsdom.config.ts

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Integration tests
        run: node scripts/ci-playwright.mjs
